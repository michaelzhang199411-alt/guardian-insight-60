<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报告模板管理 - 城市生命线监测</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Inter", "Microsoft YaHei", "PingFang SC", -apple-system, sans-serif;
  font-size: 14px; color: #4B5563; line-height: 1.5;
  background: #F3F4F6; min-width: 1280px; height: 100vh; overflow: hidden;
}
.layout { display: flex; height: 100vh; }
.sidebar {
  width: 220px; min-width: 220px; background: #fff;
  border-right: 1px solid #E5E7EB; display: flex; flex-direction: column;
}
.sidebar-header { padding: 16px; border-bottom: 1px solid #E5E7EB; display: flex; align-items: center; gap: 10px; }
.sidebar-logo-icon {
  width: 32px; height: 32px; background: #2563EB; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 600;
}
.sidebar-title { font-size: 15px; font-weight: 600; color: #1F2937; }
.sidebar-nav { padding: 8px; flex: 1; }
.nav-group-label { font-size: 11px; color: #9CA3AF; padding: 12px 12px 6px; letter-spacing: 0.5px; }
.nav-item {
  padding: 9px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: #4B5563; transition: all 0.15s; border-radius: 6px; margin-bottom: 1px; text-decoration: none;
}
.nav-item:hover { background: #F3F4F6; color: #2563EB; }
.nav-item.active { background: #EFF6FF; color: #2563EB; font-weight: 500; }
.sidebar-footer {
  padding: 12px 16px; border-top: 1px solid #E5E7EB; display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 32px; height: 32px; background: #2563EB; border-radius: 6px;
  display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 600;
}
.sidebar-collapse {
  padding: 8px; border-top: 1px solid #E5E7EB; text-align: center;
}
.collapse-btn {
  width: 28px; height: 28px; border: 1px solid #E5E7EB; border-radius: 6px; background: #fff;
  cursor: pointer; color: #9CA3AF; font-size: 12px; display: inline-flex; align-items: center; justify-content: center;
}
.collapse-btn:hover { background: #F3F4F6; color: #2563EB; }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.top-bar {
  height: 48px; background: #fff; border-bottom: 1px solid #E5E7EB;
  display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
}
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #6B7280; }
.breadcrumb span { color: #1F2937; font-weight: 500; }
.top-right { display: flex; align-items: center; gap: 12px; }

.content { flex: 1; overflow-y: auto; padding: 24px; }

/* Page Header */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.page-header h1 { font-size: 20px; font-weight: 600; color: #1F2937; }
.btn {
  padding: 8px 18px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid #E5E7EB;
  background: #fff; color: #374151; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { border-color: #2563EB; color: #2563EB; }
.btn-primary { background: #2563EB; color: #fff; border-color: #2563EB; }
.btn-primary:hover { background: #1D4ED8; }

/* Filter Bar */
.filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-search {
  padding: 8px 12px 8px 32px; border: 1px solid #E5E7EB; border-radius: 6px; font-size: 13px;
  width: 220px; outline: none; background: url("data:image/svg+xml,%3Csvg width='14' height='14' fill='none' stroke='%239CA3AF' stroke-width='1.5' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='6' cy='6' r='4.5'/%3E%3Cpath d='M9.5 9.5L13 13'/%3E%3C/svg%3E") 10px center no-repeat;
}
.filter-search:focus { border-color: #2563EB; }
.filter-group { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #6B7280; }
.filter-tag {
  padding: 5px 14px; border: 1px solid #E5E7EB; border-radius: 6px; font-size: 13px;
  cursor: pointer; background: #fff; color: #6B7280; transition: all 0.15s;
}
.filter-tag:hover { border-color: #2563EB; color: #2563EB; }
.filter-tag.active { background: #2563EB; color: #fff; border-color: #2563EB; }

/* Card Grid */
.card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.template-card {
  background: #fff; border: 1px solid #E5E7EB; border-radius: 10px; padding: 20px;
  transition: all 0.2s; cursor: pointer; position: relative;
  display: flex; flex-direction: column; min-height: 180px;
}
.template-card:hover { border-color: #93C5FD; box-shadow: 0 4px 16px rgba(37,99,235,0.08); }
.card-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.card-icon {
  width: 40px; height: 40px; background: #EFF6FF; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.card-icon svg { color: #2563EB; }
.card-title-area { flex: 1; min-width: 0; }
.card-title { font-size: 15px; font-weight: 600; color: #1F2937; margin-bottom: 4px; }
.card-status {
  display: inline-block; padding: 1px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
}
.card-status.published { background: #ECFDF5; color: #059669; }
.card-status.draft { background: #FEF3C7; color: #D97706; }
.card-desc { font-size: 13px; color: #6B7280; margin-bottom: 10px; flex: 1;
  overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 12px; }
.card-tag {
  padding: 2px 8px; background: #F3F4F6; border-radius: 4px; font-size: 11px; color: #6B7280;
}
.card-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 10px; border-top: 1px solid #F3F4F6; }
.card-date { font-size: 12px; color: #9CA3AF; }
.card-actions { display: flex; gap: 4px; }
.card-action {
  width: 30px; height: 30px; border: none; background: transparent; cursor: pointer;
  border-radius: 6px; color: #9CA3AF; display: flex; align-items: center; justify-content: center;
}
.card-action:hover { background: #F3F4F6; color: #2563EB; }
.card-action.danger:hover { color: #EF4444; background: #FEF2F2; }

/* Modal */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4);
  display: none; align-items: center; justify-content: center; z-index: 100;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff; border-radius: 12px; width: 600px; max-height: 80vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}
.modal-header {
  padding: 16px 20px; border-bottom: 1px solid #E5E7EB; display: flex; align-items: center; justify-content: space-between;
}
.modal-header h3 { font-size: 16px; font-weight: 600; color: #1F2937; }
.modal-close {
  width: 28px; height: 28px; border: none; background: #F3F4F6; border-radius: 6px; cursor: pointer;
  font-size: 16px; color: #6B7280; display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: #E5E7EB; }
.modal-body { padding: 20px; }
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
.form-label .required { color: #EF4444; }
.form-input { width: 100%; padding: 8px 12px; border: 1px solid #E5E7EB; border-radius: 6px; font-size: 13px; outline: none; }
.form-input:focus { border-color: #2563EB; }
.form-textarea { resize: vertical; min-height: 80px; font-family: inherit; }
.form-select { width: 100%; padding: 8px 12px; border: 1px solid #E5E7EB; border-radius: 6px; font-size: 13px; outline: none; background: #fff; }
.modal-footer { padding: 12px 20px; border-top: 1px solid #E5E7EB; display: flex; justify-content: flex-end; gap: 8px; }
.upload-area {
  border: 2px dashed #D1D5DB; border-radius: 8px; padding: 30px; text-align: center;
  cursor: pointer; transition: all 0.2s; color: #6B7280;
}
.upload-area:hover { border-color: #2563EB; background: #EFF6FF; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 4px; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-icon">线</div>
      <div class="sidebar-title">运营管理后台</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-group-label">概览</div>
      <a class="nav-item" href="console.html" style="text-decoration:none">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="12" height="12" rx="2"/><line x1="2" y1="6" x2="14" y2="6"/><line x1="6" y1="6" x2="6" y2="14"/></svg>
        控制台首页
      </a>
      <div class="nav-group-label">智能体配置</div>
      <a class="nav-item" href="knowledge-base.html" style="text-decoration:none">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 2h8a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V4a2 2 0 012-2z"/><path d="M6 6h4M6 9h2"/></svg>
        知识库管理
      </a>
      <a class="nav-item" href="system-qa-config.html" style="text-decoration:none">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg>
        系统问答配置
      </a>
      <a class="nav-item active" href="report-template.html" style="text-decoration:none">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 2h6l4 4v8a2 2 0 01-2 2H4a2 2 0 01-2-2V4a2 2 0 012-2z"/><path d="M10 2v4h4"/></svg>
        报告模板管理
      </a>
    </div>
    <div class="sidebar-footer">
      <div class="user-avatar">张</div>
      <div>
        <div style="font-size:13px;color:#1F2937;font-weight:500">张工</div>
        <div style="font-size:11px;color:#9CA3AF">运维管理员</div>
      </div>
    </div>
    <div class="sidebar-collapse"><button class="collapse-btn">‹</button></div>
  </aside>

  <main class="main">
    <div class="top-bar">
      <div class="breadcrumb">模板管理 / <span>报告模板</span></div>
      <div class="top-right">
        <button class="btn" onclick="location.href='index.html'">← 返回AI助手</button>
      </div>
    </div>
    <div class="content">
      <div class="page-header">
        <h1>报告模板管理</h1>
        <button class="btn btn-primary" onclick="showUploadModal()">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 1v12M1 7h12"/></svg>
          上传模板
        </button>
      </div>

      <div class="filter-bar">
        <input type="text" class="filter-search" placeholder="搜索模板名称..." id="searchInput" oninput="filterCards()">
        <div class="filter-group">
          <span>分类：</span>
          <button class="filter-tag active" data-filter="cat" data-value="all" onclick="setFilter(this,'cat')">全部</button>
          <button class="filter-tag" data-filter="cat" data-value="燃气" onclick="setFilter(this,'cat')">燃气</button>
          <button class="filter-tag" data-filter="cat" data-value="供水" onclick="setFilter(this,'cat')">供水</button>
          <button class="filter-tag" data-filter="cat" data-value="排水" onclick="setFilter(this,'cat')">排水</button>
          <button class="filter-tag" data-filter="cat" data-value="桥梁" onclick="setFilter(this,'cat')">桥梁</button>
          <button class="filter-tag" data-filter="cat" data-value="消防" onclick="setFilter(this,'cat')">消防</button>
          <button class="filter-tag" data-filter="cat" data-value="电梯" onclick="setFilter(this,'cat')">电梯</button>
        </div>
        <div class="filter-group">
          <span>状态：</span>
          <button class="filter-tag active" data-filter="status" data-value="all" onclick="setFilter(this,'status')">全部</button>
          <button class="filter-tag" data-filter="status" data-value="已发布" onclick="setFilter(this,'status')">已发布</button>
          <button class="filter-tag" data-filter="status" data-value="草稿" onclick="setFilter(this,'status')">草稿</button>
        </div>
      </div>

      <div class="card-grid" id="cardGrid"></div>
    </div>
  </main>
</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <div class="modal-header"><h3>上传模板</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label"><span class="required">*</span> 模板名称</label>
        <input type="text" class="form-input" placeholder="请输入模板名称">
      </div>
      <div class="form-group">
        <label class="form-label"><span class="required">*</span> 上传模板文件</label>
        <div class="upload-area">
          <div style="font-size:28px;margin-bottom:8px">📄</div>
          <p>点击或拖拽文件至此区域上传</p>
          <p style="font-size:11px;color:#9CA3AF;margin-top:6px">支持 .docx, .xlsx, .pdf 格式</p>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">模板描述</label>
        <textarea class="form-input form-textarea" placeholder="请输入模板描述"></textarea>
      </div>
      <div style="display:flex;gap:16px">
        <div class="form-group" style="flex:1">
          <label class="form-label"><span class="required">*</span> 分类</label>
          <select class="form-select"><option>燃气</option><option>供水</option><option>排水</option><option>桥梁</option><option>消防</option><option>电梯</option><option>综合</option></select>
        </div>
        <div class="form-group" style="flex:1">
          <label class="form-label"><span class="required">*</span> 报告类型</label>
          <select class="form-select"><option>月报</option><option>周报</option><option>季报</option><option>专报</option></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="closeModal()">确认上传</button>
    </div>
  </div>
</div>

<script>
const templates = [
  { name:'燃气专项安全运行月报', status:'已发布', desc:'包含预警统计、设备运行、风险评估等5个章节', tags:['月报','燃气'], date:'2026-03-20 14:30', cat:'燃气' },
  { name:'供水专项安全运行月报', status:'已发布', desc:'涵盖供水管网压力监测、水质分析等内容', tags:['月报','供水'], date:'2026-03-18 10:15', cat:'供水' },
  { name:'排水专项安全运行月报', status:'已发布', desc:'排水管网运行状态、液位监测及预警分析', tags:['月报','排水'], date:'2026-03-15 16:45', cat:'排水' },
  { name:'桥梁专项安全运行月报', status:'草稿', desc:'桥梁结构健康监测、荷载分析及风险评估', tags:['月报','桥梁'], date:'2026-03-12 09:00', cat:'桥梁' },
  { name:'消防设施巡检周报', status:'草稿', desc:'消防设施运行状态、巡检记录汇总', tags:['周报','消防'], date:'2026-03-10 11:20', cat:'消防' },
  { name:'电梯运行安全月报', status:'已发布', desc:'电梯运行状态监测、故障统计及维保分析', tags:['月报','电梯'], date:'2026-03-08 15:30', cat:'电梯' },
  { name:'综合安全运行季报', status:'草稿', desc:'全市生命线安全运行综合分析季度报告', tags:['季报','综合'], date:'2026-03-05 10:00', cat:'综合' },
  { name:'供水管网压力分析专报', status:'已发布', desc:'供水管网压力异常分析及处置建议', tags:['专报','供水'], date:'2026-03-01 08:45', cat:'供水' },
];

let filters = { cat: 'all', status: 'all' };

function setFilter(el, group) {
  document.querySelectorAll(`.filter-tag[data-filter="${group}"]`).forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  filters[group] = el.dataset.value;
  filterCards();
}

function filterCards() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const grid = document.getElementById('cardGrid');
  const filtered = templates.filter(t => {
    if (filters.cat !== 'all' && t.cat !== filters.cat) return false;
    if (filters.status !== 'all' && t.status !== filters.status) return false;
    if (search && !t.name.toLowerCase().includes(search)) return false;
    return true;
  });
  grid.innerHTML = filtered.map(t => `
    <div class="template-card">
      <div class="card-header">
        <div class="card-icon">
          <svg width="20" height="20" fill="none" stroke="#2563EB" stroke-width="1.5"><path d="M5 2h7l5 5v10a2 2 0 01-2 2H5a2 2 0 01-2-2V4a2 2 0 012-2z"/><path d="M12 2v5h5"/></svg>
        </div>
        <div class="card-title-area">
          <div class="card-title">${t.name}</div>
          <span class="card-status ${t.status==='已发布'?'published':'draft'}">${t.status}</span>
        </div>
      </div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-tags">${t.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('')}</div>
      <div class="card-footer">
        <span class="card-date">${t.date}</span>
        <div class="card-actions">
          <button class="card-action" title="预览"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z"/></svg></button>
          <button class="card-action" title="编辑" onclick="event.stopPropagation(); location.href='report-template-edit.html'"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M11 2l3 3L5 14H2v-3L11 2z"/></svg></button>
          <button class="card-action danger" title="删除"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 5h10M5 5V3h6v2M6 8v4M10 8v4"/></svg></button>
        </div>
      </div>
    </div>
  `).join('');
}

function showUploadModal() { document.getElementById('uploadModal').classList.add('show'); }
function closeModal() { document.getElementById('uploadModal').classList.remove('show'); }

filterCards();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>模板编辑 - 城市生命线监测</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Inter", "Microsoft YaHei", "PingFang SC", -apple-system, sans-serif;
  font-size: 14px; color: #4B5563; line-height: 1.5;
  background: #F3F4F6; min-width: 1280px; height: 100vh; overflow: hidden;
}
.layout { display: flex; height: 100vh; }

/* Sidebar - same as other pages */
.sidebar {
  width: 220px; min-width: 220px; background: #fff;
  border-right: 1px solid #E5E7EB; display: flex; flex-direction: column;
}
.sidebar-header { padding: 16px; border-bottom: 1px solid #E5E7EB; display: flex; align-items: center; gap: 10px; }
.sidebar-logo-icon {
  width: 32px; height: 32px; background: #2563EB; border-radius: 8px;
  display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; font-weight: 600;
}
.sidebar-title { font-size: 15px; font-weight: 600; color: #1F2937; }
.sidebar-nav { padding: 8px; flex: 1; }
.nav-group-label { font-size: 11px; color: #9CA3AF; padding: 12px 12px 6px; letter-spacing: 0.5px; }
.nav-item {
  padding: 9px 12px; cursor: pointer; display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: #4B5563; transition: all 0.15s; border-radius: 6px; margin-bottom: 1px; text-decoration: none;
}
.nav-item:hover { background: #F3F4F6; color: #2563EB; }
.nav-item.active { background: #EFF6FF; color: #2563EB; font-weight: 500; }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid #E5E7EB; display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 32px; height: 32px; background: #2563EB; border-radius: 6px;
  display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; font-weight: 600;
}
.sidebar-collapse { padding: 8px; border-top: 1px solid #E5E7EB; text-align: center; }
.collapse-btn {
  width: 28px; height: 28px; border: 1px solid #E5E7EB; border-radius: 6px; background: #fff;
  cursor: pointer; color: #9CA3AF; font-size: 12px; display: inline-flex; align-items: center; justify-content: center;
}
.collapse-btn:hover { background: #F3F4F6; color: #2563EB; }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Top bar */
.top-bar {
  height: 48px; background: #fff; border-bottom: 1px solid #E5E7EB;
  display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
}
.top-bar-left { display: flex; align-items: center; gap: 12px; }
.breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 14px; color: #6B7280; }
.breadcrumb a { color: #6B7280; text-decoration: none; }
.breadcrumb a:hover { color: #2563EB; }
.breadcrumb span { color: #1F2937; font-weight: 500; }
.top-bar-actions { display: flex; align-items: center; gap: 8px; }
.btn {
  padding: 7px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid #E5E7EB;
  background: #fff; color: #374151; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { border-color: #2563EB; color: #2563EB; }
.btn-primary { background: #2563EB; color: #fff; border-color: #2563EB; }
.btn-primary:hover { background: #1D4ED8; color: #fff; }
.btn-success { background: #059669; color: #fff; border-color: #059669; }
.btn-success:hover { background: #047857; color: #fff; }

/* Parse banner */
.parse-banner {
  background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 8px; padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between; margin: 16px 16px 0;
}
.parse-banner-left { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #1D4ED8; }
.parse-banner-dot { width: 8px; height: 8px; background: #2563EB; border-radius: 50%; }
.parse-confirm-btn {
  padding: 5px 14px; background: #2563EB; color: #fff; border: none; border-radius: 5px;
  font-size: 12px; cursor: pointer;
}
.parse-confirm-btn:hover { background: #1D4ED8; }

/* Legend bar */
.legend-bar {
  display: flex; align-items: center; gap: 16px; padding: 8px 16px; font-size: 12px; color: #6B7280;
}
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-param { display: inline-block; padding: 1px 6px; background: #DBEAFE; color: #2563EB; border-radius: 3px; font-size: 11px; }
.legend-var { display: inline-block; padding: 1px 6px; background: #FED7AA; color: #C2410C; border-radius: 3px; font-size: 11px; }
.legend-table { display: inline-flex; align-items: center; gap: 2px; color: #6B7280; }

/* Editor area - three columns */
.editor-area { flex: 1; display: flex; overflow: hidden; }

/* Left: TOC tree */
.toc-panel {
  width: 200px; min-width: 200px; background: #fff; border-right: 1px solid #E5E7EB;
  display: flex; flex-direction: column; overflow: hidden;
}
.toc-header {
  padding: 12px 14px; border-bottom: 1px solid #E5E7EB; font-size: 13px; font-weight: 600; color: #1F2937;
  display: flex; align-items: center; justify-content: space-between;
}
.toc-body { flex: 1; overflow-y: auto; padding: 8px 0; }
.toc-chapter {
  padding: 0 8px; margin-bottom: 2px;
}
.toc-chapter-title {
  display: flex; align-items: center; gap: 4px; padding: 6px 8px; cursor: pointer;
  font-size: 13px; font-weight: 600; color: #1F2937; border-radius: 5px; transition: all 0.15s;
}
.toc-chapter-title:hover { background: #F3F4F6; }
.toc-chapter-title.active { background: #EFF6FF; color: #2563EB; }
.toc-arrow { font-size: 10px; color: #9CA3AF; transition: transform 0.2s; width: 14px; text-align: center; }
.toc-arrow.expanded { transform: rotate(90deg); }
.toc-sections { padding-left: 18px; }
.toc-section {
  display: flex; align-items: center; gap: 4px; padding: 5px 8px; cursor: pointer;
  font-size: 12px; color: #4B5563; border-radius: 5px; transition: all 0.15s;
}
.toc-section:hover { background: #F3F4F6; color: #2563EB; }
.toc-section.active { background: #EFF6FF; color: #2563EB; font-weight: 500; }
.toc-pin { font-size: 11px; color: #F59E0B; }

/* Center: Preview area */
.preview-panel {
  flex: 1; overflow-y: auto; background: #F9FAFB; padding: 24px;
}
.preview-paper {
  max-width: 800px; margin: 0 auto; background: #fff; border: 1px solid #E5E7EB;
  border-radius: 8px; padding: 40px 48px; min-height: 1000px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.report-title {
  font-size: 22px; font-weight: 700; color: #111827; text-align: center; margin-bottom: 32px;
  padding-bottom: 16px; border-bottom: 2px solid #E5E7EB;
}
.chapter-title {
  font-size: 17px; font-weight: 700; color: #111827; margin: 28px 0 14px; padding-bottom: 6px;
  border-bottom: 1px solid #F3F4F6; cursor: pointer; border-radius: 4px; padding: 6px 8px;
  transition: background 0.15s;
}
.chapter-title:hover { background: #F0F9FF; }
.chapter-title.selected { background: #EFF6FF; outline: 2px solid #93C5FD; }
.section-title {
  font-size: 15px; font-weight: 600; color: #1F2937; margin: 18px 0 10px; cursor: pointer;
  padding: 4px 8px; border-radius: 4px; transition: background 0.15s;
}
.section-title:hover { background: #F0F9FF; }
.section-title.selected { background: #EFF6FF; outline: 2px solid #93C5FD; }
.report-para {
  font-size: 14px; color: #374151; line-height: 1.8; margin-bottom: 14px; padding: 4px 8px;
  border-radius: 4px;
}
.param-tag {
  display: inline-flex; align-items: center; gap: 2px; padding: 1px 8px; background: #DBEAFE;
  color: #2563EB; border-radius: 4px; font-size: 13px; cursor: pointer; border: 1px solid transparent;
  transition: all 0.15s;
}
.param-tag:hover { border-color: #93C5FD; background: #BFDBFE; }
.param-tag.selected { border-color: #2563EB; box-shadow: 0 0 0 2px rgba(37,99,235,0.2); }
.param-value { font-weight: 600; color: #1D4ED8; }
.param-name { font-size: 11px; color: #60A5FA; margin-left: 2px; }
.var-tag {
  display: inline-flex; align-items: center; gap: 2px; padding: 1px 8px; background: #FED7AA;
  color: #C2410C; border-radius: 4px; font-size: 13px;
}

/* Data table in preview */
.data-table-wrapper {
  margin: 14px 0; border: 2px solid transparent; border-radius: 6px; padding: 2px;
  cursor: pointer; transition: all 0.2s;
}
.data-table-wrapper:hover { border-color: #93C5FD; background: #F0F9FF; }
.data-table-wrapper.selected { border-color: #2563EB; background: #EFF6FF; }
.data-table-label {
  display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6B7280; margin-bottom: 6px; padding: 0 4px;
}
.data-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.data-table th {
  background: #F3F4F6; padding: 8px 12px; text-align: left; font-weight: 600; color: #374151;
  border: 1px solid #E5E7EB; font-size: 12px;
}
.data-table td {
  padding: 7px 12px; border: 1px solid #E5E7EB; color: #4B5563; font-size: 12px;
}

/* Right: Settings panel */
.settings-panel {
  width: 320px; min-width: 320px; background: #fff; border-left: 1px solid #E5E7EB;
  display: flex; flex-direction: column; overflow: hidden; transition: width 0.3s;
}
.settings-panel.collapsed { width: 0; min-width: 0; overflow: hidden; }
.settings-header {
  padding: 12px 16px; border-bottom: 1px solid #E5E7EB; display: flex; align-items: center; gap: 8px;
}
.settings-icon {
  width: 32px; height: 32px; background: #EFF6FF; border-radius: 6px;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.settings-header-text { flex: 1; }
.settings-header-title { font-size: 13px; font-weight: 600; color: #1F2937; }
.settings-header-sub { font-size: 11px; color: #9CA3AF; }
.settings-body { flex: 1; overflow-y: auto; padding: 16px; }
.settings-footer {
  padding: 12px 16px; border-top: 1px solid #E5E7EB; display: flex; gap: 8px; justify-content: flex-end;
}

/* Settings sections */
.setting-section { margin-bottom: 20px; }
.setting-section-title {
  font-size: 13px; font-weight: 600; color: #1F2937; margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.setting-section-title .icon { font-size: 14px; }
.setting-row { margin-bottom: 10px; }
.setting-label { font-size: 12px; color: #6B7280; margin-bottom: 4px; display: block; }
.setting-input {
  width: 100%; padding: 7px 10px; border: 1px solid #E5E7EB; border-radius: 5px;
  font-size: 12px; outline: none; background: #fff;
}
.setting-input:focus { border-color: #2563EB; }
.setting-select {
  width: 100%; padding: 7px 10px; border: 1px solid #E5E7EB; border-radius: 5px;
  font-size: 12px; outline: none; background: #fff;
}

/* Score display */
.score-display {
  background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 8px; padding: 16px; text-align: center;
  margin-bottom: 12px;
}
.score-value { font-size: 36px; font-weight: 700; color: #111827; }
.score-badge {
  display: inline-block; padding: 2px 8px; background: #DBEAFE; color: #2563EB;
  border-radius: 4px; font-size: 11px; margin-left: 6px; vertical-align: middle;
}

/* Rule items */
.rule-box {
  background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 6px; padding: 10px; margin-bottom: 8px;
  font-size: 12px; color: #374151; line-height: 1.7;
}
.rule-number { font-weight: 600; color: #2563EB; }

/* Analysis rule panel */
.template-content-box {
  background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 6px; padding: 10px;
  font-size: 12px; color: #92400E; line-height: 1.7; margin-bottom: 12px;
}
.analysis-rule-textarea {
  width: 100%; min-height: 100px; padding: 10px; border: 1px solid #E5E7EB; border-radius: 6px;
  font-size: 12px; outline: none; resize: vertical; font-family: inherit; line-height: 1.7;
}
.analysis-rule-textarea:focus { border-color: #2563EB; }

/* Data binding */
.binding-option {
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 12px; color: #374151;
}
.binding-option input[type="radio"],
.binding-option input[type="checkbox"] { accent-color: #2563EB; }

/* NL input */
.nl-input-area {
  display: flex; gap: 6px; margin-top: 8px;
}
.nl-input {
  flex: 1; padding: 7px 10px; border: 1px solid #E5E7EB; border-radius: 5px;
  font-size: 12px; outline: none;
}
.nl-input:focus { border-color: #2563EB; }
.nl-send {
  padding: 7px 12px; background: #2563EB; color: #fff; border: none; border-radius: 5px;
  font-size: 12px; cursor: pointer;
}
.nl-send:hover { background: #1D4ED8; }

/* Default panel placeholder */
.settings-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: #9CA3AF; font-size: 13px; gap: 8px;
}
.settings-empty-icon { font-size: 32px; opacity: 0.5; }

/* Result preview mini table */
.preview-mini-table {
  width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 8px;
}
.preview-mini-table th {
  background: #F3F4F6; padding: 5px 8px; text-align: left; font-weight: 500;
  border: 1px solid #E5E7EB; color: #6B7280;
}
.preview-mini-table td {
  padding: 4px 8px; border: 1px solid #E5E7EB; color: #4B5563;
}
.preview-hint { font-size: 11px; color: #9CA3AF; margin-top: 6px; text-align: right; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 4px; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo-icon">线</div>
      <div class="sidebar-title">运营管理后台</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-group-label">概览</div>
      <a class="nav-item" href="console.html" style="text-decoration:none">

          <a href="report-template.html">模板管理</a> / <span>燃气专项安全运行月报</span>

    <!-- Three-column editor -->
    <div class="editor-area">
      <!-- Left: TOC Tree -->

      <div class="preview-panel" id="previewPanel">
        <div class="preview-paper" id="previewPaper"></div>

<script>
// Template structure data
const templateStructure = [
  {
    id: 'ch1', title: '第一章 监测概况', hasRule: false,
    sections: [
      { id: 's1_1', title: '1.1 监测对象的健康状况', hasRule: true },
      { id: 's1_2', title: '1.2 报警统计', hasRule: false },
      { id: 's1_3', title: '1.2 预警情况说明', hasRule: true, hasTable: true },
    ]
  },
  {
    id: 'ch2', title: '第二章 预警统计分析', hasRule: false,
    sections: [
      { id: 's2_6', title: '2.6 预警分析结论', hasRule: true },
    ]
  },
  {
    id: 'ch3', title: '第三章 设备运行分析', hasRule: false,
    sections: [
      { id: 's3_3', title: '3.3 运行分析结论', hasRule: true },
    ]
  },
  {
    id: 'ch4', title: '第四章 风险评估', hasRule: false,
    sections: [
      { id: 's4_2', title: '4.2 风险评估结论', hasRule: false },
    ]
  },
  {
    id: 'ch5', title: '第五章 总结与建议', hasRule: false,
    sections: [
      { id: 's5_1', title: '5.1 本月工作总结', hasRule: false },
      { id: 's5_2', title: '5.2 下月工作建议', hasRule: false },
    ]
  }
];

let selectedItem = null;
let expandedChapters = { ch1: true, ch2: true, ch3: true, ch4: true, ch5: true };

// Render TOC tree
function renderToc() {
  const container = document.getElementById('tocTree');
  container.innerHTML = templateStructure.map(ch => `
    <div class="toc-chapter">
      <div class="toc-chapter-title ${selectedItem === ch.id ? 'active' : ''}"
           onclick="toggleChapter('${ch.id}'); selectItem('${ch.id}', 'chapter', '${ch.title}')">
        <span class="toc-arrow ${expandedChapters[ch.id] ? 'expanded' : ''}">▶</span>
        ${ch.title}
      </div>
      <div class="toc-sections" style="display:${expandedChapters[ch.id] ? 'block' : 'none'}">
        ${ch.sections.map(s => `
          <div class="toc-section ${selectedItem === s.id ? 'active' : ''}"
               onclick="event.stopPropagation(); selectItem('${s.id}', '${s.hasTable ? 'table' : 'section'}', '${s.title}')">
            ${s.title}
            ${s.hasRule ? '<span class="toc-pin">📌</span>' : ''}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function toggleChapter(chId) {
  expandedChapters[chId] = !expandedChapters[chId];
  renderToc();
}

function selectItem(id, type, title) {
  selectedItem = id;
  renderToc();

  // Highlight in preview
  document.querySelectorAll('.chapter-title, .section-title, .data-table-wrapper, .param-tag').forEach(el => {
    el.classList.remove('selected');
  });
  const el = document.getElementById('preview-' + id);
  if (el) {
    el.classList.add('selected');
    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Show settings panel
  if (type === 'table') {
    showDataComponentPanel(id, title);
  } else if (type === 'chapter') {
    showAnalysisRulePanel(id, title, 'chapter');
  } else {
    showAnalysisRulePanel(id, title, 'section');
  }
}

// Data component config panel
function showDataComponentPanel(id, title) {
  const panel = document.getElementById('settingsContent');
  panel.innerHTML = `
    <div class="settings-header">
      <div class="settings-icon">📊</div>
      <div class="settings-header-text">
        <div class="settings-header-title">当前选中：${title}</div>
        <div class="settings-header-sub">数据组件 · 表格</div>
      </div>
    </div>
    <div class="settings-body">

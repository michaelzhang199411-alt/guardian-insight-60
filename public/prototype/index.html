<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>城市生命线安全运行监测AI助手</title>
<style>
/* ========== Reset & Base ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Inter", "Microsoft YaHei", "PingFang SC", -apple-system, sans-serif;
  font-size: 14px;
  color: #4B5563;
  line-height: 1.5;
  background: #FFFFFF;
  min-width: 1280px;
  overflow: hidden;
  height: 100vh;
}

/* ========== Layout ========== */
.app-layout {
  display: flex;
  height: 100vh;
  width: 100%;
}

/* ========== Left Sidebar ========== */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: #F9FAFB;
  border-right: 1px solid #E5E7EB;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.sidebar-header {
  padding: 16px 16px 12px;
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo-icon {
  width: 32px; height: 32px;
  background: #2563EB;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: 600;
  flex-shrink: 0;
}
.sidebar-brand {
  display: flex; flex-direction: column;
}
.sidebar-title {
  font-size: 16px; font-weight: 600; color: #1F2937; line-height: 1.3;
}
.sidebar-subtitle {
  font-size: 12px; color: #9CA3AF; line-height: 1.2;
}

.sidebar-actions {
  padding: 0 12px 8px;
}
.btn-new-chat {
  height: 36px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.2s;
  border: 1px solid #E5E7EB;
  width: 100%;
  background: #fff; color: #2563EB; font-weight: 500;
}
.btn-new-chat:hover { background: #EFF6FF; border-color: #2563EB; }

.sidebar-nav {
  padding: 8px 12px;
}
.nav-item {
  padding: 8px 12px;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; color: #4B5563;
  transition: all 0.2s;
  border-radius: 8px;
  margin-bottom: 2px;
  text-decoration: none;
}
.nav-item:hover { background: #F3F4F6; color: #2563EB; }
.nav-item.active { background: #EFF6FF; color: #2563EB; }
.nav-item svg { flex-shrink: 0; }

.sidebar-history {
  flex: 1;
  overflow-y: auto;
  padding: 0 0 8px;
}
.history-group-label {
  font-size: 12px; color: #9CA3AF;
  padding: 12px 16px 4px; font-weight: 500;
}
.history-item {
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 8px;
  margin: 0 8px;
  border-radius: 8px;
  font-size: 14px; color: #4B5563;
}
.history-item:hover { background: #F3F4F6; }
.history-item.active { background: #EFF6FF; color: #2563EB; }
.history-item svg { flex-shrink: 0; color: #9CA3AF; }
.history-item.active svg { color: #2563EB; }
.history-item-title {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid #E5E7EB;
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 32px; height: 32px;
  background: #2563EB; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: 600;
  flex-shrink: 0;
}
.user-info-name { font-size: 14px; color: #1F2937; font-weight: 500; }

/* ========== Main Area ========== */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  min-width: 0;
  background: #FFFFFF;
  transition: flex 0.3s ease;
}
.app-layout.report-open .main-area {
  flex: 4;
}

/* Top bar - minimal */
.top-bar {
  height: 48px; min-height: 48px;
  display: flex; align-items: center; justify-content: flex-end;
  padding: 0 20px;
  border-bottom: 1px solid #E5E7EB;
}
.top-bar-actions {
  display: flex; align-items: center; gap: 12px;
}
.top-bar-icon {
  width: 32px; height: 32px; cursor: pointer;
  color: #9CA3AF; transition: color 0.2s;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
}
.top-bar-icon:hover { color: #4B5563; background: #F3F4F6; }
.online-indicator {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: #9CA3AF;
  margin-right: auto;
}
.online-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #10B981;
}

/* ========== Chat Area ========== */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  display: flex;
  flex-direction: column;
}
.chat-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 24px 60px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.chat-scroll .chat-msg {
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
}

/* Welcome Card */
.welcome-card {
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
  padding: 40px 0 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.welcome-hero {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 48px;
  margin-top: 40px;
}
.welcome-robot {
  width: 120px;
  height: 120px;
  flex-shrink: 0;
}
.welcome-robot img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.welcome-greeting {
  font-size: 28px;
  font-weight: 700;
  color: #1F2937;
  white-space: nowrap;
}

.welcome-try-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  margin-bottom: 16px;
}
.welcome-try-label {
  font-size: 14px;
  color: #6B7280;
}
.welcome-refresh-btn {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px; color: #9CA3AF;
  cursor: pointer; background: none; border: none;
  transition: color 0.2s;
}
.welcome-refresh-btn:hover { color: #2563EB; }
.welcome-suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  width: 100%;
}
.welcome-suggestion-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  background: #F9FAFB;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  font-size: 14px;
  color: #374151;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.welcome-suggestion-item:hover {
  background: #EFF6FF;
  border-color: #BFDBFE;
  color: #2563EB;
}
.welcome-suggestion-icon {
  color: #9CA3AF;
  flex-shrink: 0;
}

/* Agent tag in input box */
.input-agent-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #EFF6FF;
  color: #2563EB;
  font-size: 12px;
  font-weight: 500;
  padding: 3px 8px 3px 10px;
  border-radius: 4px;
  margin: 8px 0 0 12px;
}
.input-agent-tag .tag-close {
  width: 16px; height: 16px;
  border: none; background: none;
  cursor: pointer; color: #93C5FD;
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px; transition: all 0.15s;
  padding: 0;
}
.input-agent-tag .tag-close:hover { color: #2563EB; background: #DBEAFE; }

/* Agent badge in AI reply */
.agent-badge-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.agent-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  background: #EFF6FF;
  color: #2563EB;
  font-size: 12px;
  font-weight: 500;
  border-radius: 4px;
}
.agent-badge-text {
  font-size: 13px;
  color: #6B7280;
}

/* Chat Messages */
.chat-msg {
  display: flex;
  gap: 0;
  max-width: 100%;
}
.chat-msg.user {
  justify-content: flex-end;
}
.chat-msg.ai {
  justify-content: flex-start;
}
.msg-bubble {
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 14px; line-height: 1.6;
  max-width: 75%;
}
.msg-bubble.user-bubble {
  background: #2563EB; color: #FFFFFF;
  border-radius: 8px 8px 2px 8px;
}
.msg-bubble.ai-bubble {
  background: transparent; color: #4B5563;
  padding: 0;
  max-width: 100%;
}
.ai-content {
  font-size: 14px; line-height: 1.7; color: #374151;
}
.ai-content strong { color: #1F2937; }

/* Report Card in chat (like document preview) */
.report-card-inline {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: #F9FAFB;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  margin: 12px 0;
  cursor: pointer;
  transition: all 0.2s;
  max-width: 420px;
}
.report-card-inline:hover {
  background: #EFF6FF; border-color: #BFDBFE;
}
.report-card-icon {
  width: 36px; height: 36px;
  background: #EFF6FF;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #2563EB; font-size: 18px;
  flex-shrink: 0;
}
.report-card-info {
  flex: 1; min-width: 0;
}
.report-card-title {
  font-size: 14px; color: #1F2937; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.report-card-meta {
  font-size: 12px; color: #9CA3AF;
}
.report-card-thumb {
  width: 64px; height: 48px;
  background: #F3F4F6;
  border-radius: 4px;
  border: 1px solid #E5E7EB;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: #9CA3AF;
  flex-shrink: 0;
  overflow: hidden;
}
.report-card-thumb-inner {
  width: 100%; height: 100%;
  padding: 4px;
  font-size: 7px; color: #9CA3AF; line-height: 1.2;
  overflow: hidden;
}

/* Switch to direct reply link */
.switch-reply-link {
  font-size: 13px; color: #2563EB; cursor: pointer;
  margin: 4px 0 8px;
  display: inline-flex; align-items: center; gap: 2px;
}
.switch-reply-link:hover { text-decoration: underline; }

/* AI Action Buttons Row */
.ai-actions-row {
  display: flex; align-items: center; gap: 8px; margin-top: 10px;
  padding-top: 2px;
}
.ai-action-btn {
  width: 28px; height: 28px;
  border: none; background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #9CA3AF; border-radius: 6px;
  transition: all 0.15s;
}
.ai-action-btn:hover { color: #4B5563; background: #F3F4F6; }
.ai-actions-sep {
  width: 1px; height: 16px; background: #E5E7EB;
}
.ai-ref-count {
  font-size: 12px; color: #9CA3AF; margin-left: 4px;
}

/* Suggestion Buttons below AI response */
.ai-suggestions {
  display: flex; flex-direction: column; gap: 8px; margin-top: 14px;
}
.ai-suggest-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 8px 14px;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  background: #fff;
  font-size: 14px; color: #4B5563;
  cursor: pointer;
  transition: all 0.2s;
  width: fit-content;
}
.ai-suggest-btn:hover {
  background: #EFF6FF; color: #2563EB; border-color: #BFDBFE;
}
.ai-suggest-btn .arrow {
  color: #9CA3AF; font-size: 12px; margin-left: 2px;
}

/* Data Card in AI bubble */
.data-card {
  background: #FFFFFF;
  border-radius: 8px;
  padding: 12px 16px;
  margin-top: 12px;
  border: 1px solid #E5E7EB;
}
.data-card-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0;
}
.data-card-row:not(:last-child) {
  border-bottom: 1px solid #E5E7EB;
}
.data-label { font-size: 14px; color: #4B5563; }
.data-value { font-size: 18px; font-weight: 600; color: #2563EB; }
.data-trend { font-size: 12px; margin-left: 6px; }
.data-trend.up { color: #EF4444; }
.data-trend.down { color: #10B981; }

/* Typing indicator */
.typing-indicator {
  display: flex; align-items: center; gap: 4px;
  color: #3B82F6; font-size: 14px;
}
.typing-dot {
  width: 6px; height: 6px;
  background: #3B82F6; border-radius: 50%;
  animation: blink 1.4s infinite both;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.3; }
  40% { opacity: 1; }
}

/* ========== Bottom Input Area ========== */
.input-area {
  background: #FFFFFF;
  padding: 12px 60px 16px;
}
.input-wrapper {
  border: 1px solid #E5E7EB;
  border-radius: 12px;
  background: #FFFFFF;
  padding: 0;
  transition: border-color 0.2s, box-shadow 0.2s;
  max-width: 800px;
  margin: 0 auto;
}
.input-wrapper:focus-within {
  border-color: #BFDBFE;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
}
.input-box {
  width: 100%;
  min-height: 44px; max-height: 120px;
  border: none;
  padding: 12px 16px 4px;
  font-size: 14px; color: #374151;
  background: transparent;
  resize: none;
  font-family: inherit;
  line-height: 1.5;
  outline: none;
}
.input-box::placeholder { color: #D1D5DB; }
.input-toolbar {
  display: flex; align-items: center; gap: 0;
  padding: 4px 8px 8px;
  flex-wrap: wrap;
}
.toolbar-btn {
  height: 30px;
  padding: 0 10px;
  border: none;
  background: none;
  font-size: 13px; color: #9CA3AF;
  cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  border-radius: 6px;
  transition: all 0.15s;
  white-space: nowrap;
}
.toolbar-btn:hover { color: #4B5563; background: #F3F4F6; }
.toolbar-sep {
  width: 1px; height: 16px; background: #E5E7EB;
  margin: 0 4px;
}
.toolbar-spacer { flex: 1; }
.btn-mic {
  width: 30px; height: 30px;
  border: none; background: none;
  color: #9CA3AF; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  transition: all 0.15s;
}
.btn-mic:hover { color: #4B5563; background: #F3F4F6; }

/* ========== Right Report Panel ========== */
.report-panel {
  width: 0;
  flex: 0;
  overflow: hidden;
  background: #FFFFFF;
  border-left: 1px solid #E5E7EB;
  transition: flex 0.3s ease, width 0.3s ease;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.report-panel.open {
  flex: 6;
  width: auto;
  min-width: 0;
}

/* When report is open, collapse extra toolbar buttons to keep one line */
.app-layout.report-open .toolbar-btn.collapsible {
  display: none;
}
.app-layout.report-open .input-toolbar {
  flex-wrap: nowrap;
}
.report-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid #E5E7EB;
  min-height: 48px;
}
.report-title-main {
  font-size: 16px; font-weight: 600; color: #1F2937;
  white-space: nowrap;
}
.report-header-actions {
  display: flex; gap: 4px;
}
.report-header-actions button {
  width: 28px; height: 28px;
  border: none; border-radius: 8px;
  background: transparent; cursor: pointer;
  color: #9CA3AF;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.report-header-actions button:hover {
  background: #F3F4F6; color: #4B5563;
}

/* Report panel split: TOC + Content */
.report-split {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* TOC sidebar */
.report-toc {
  width: 200px;
  min-width: 200px;
  border-right: 1px solid #E5E7EB;
  background: #F9FAFB;
  overflow-y: auto;
  padding: 16px 0;
  transition: width 0.25s ease, min-width 0.25s ease, padding 0.25s ease, opacity 0.2s ease;
}
.report-toc.collapsed {
  width: 0;
  min-width: 0;
  padding: 0;
  border-right: none;
  overflow: hidden;
  opacity: 0;
}
.report-toc-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px 12px;
  border-bottom: 1px solid #E5E7EB;
  margin-bottom: 8px;
}
.report-toc-title {
  font-size: 13px;
  font-weight: 600;
  color: #1F2937;
}
.toc-toggle-btn {
  width: 22px; height: 22px;
  border: none; background: none;
  cursor: pointer; color: #9CA3AF;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px; transition: all 0.15s;
}
.toc-toggle-btn:hover { color: #4B5563; background: #E5E7EB; }
/* Expand button shown when TOC is collapsed */
.toc-expand-btn {
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 20px; height: 40px;
  border: 1px solid #E5E7EB;
  border-left: none;
  border-radius: 0 6px 6px 0;
  background: #F9FAFB;
  cursor: pointer; color: #9CA3AF;
  display: none;
  align-items: center; justify-content: center;
  z-index: 10;
  transition: all 0.15s;
}
.toc-expand-btn:hover { color: #2563EB; background: #EFF6FF; }
.toc-expand-btn.visible { display: flex; }
/* Download dropdown */
.download-dropdown {
  position: absolute;
  top: 100%; right: 0;
  background: #fff;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  padding: 4px 0;
  display: none;
  z-index: 600;
  min-width: 160px;
}
.download-dropdown.show { display: block; }
.download-dropdown-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  font-size: 13px; color: #374151;
  cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.download-dropdown-item:hover { background: #EFF6FF; color: #2563EB; }
.download-dropdown-item svg { flex-shrink: 0; }
.toc-item {
  display: block;
  padding: 8px 16px;
  font-size: 13px;
  color: #4B5563;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
  text-decoration: none;
}
.toc-item:hover {
  background: #F3F4F6;
  color: #2563EB;
}
.toc-item.active {
  background: #EFF6FF;
  color: #2563EB;
  border-left-color: #2563EB;
  font-weight: 500;
}
.toc-item.sub {
  padding-left: 28px;
  font-size: 12px;
}

/* Report content area */
.report-content-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px;
  min-width: 0;
  outline: none;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

/* Floating toolbar */
.floating-toolbar {
  position: absolute;
  display: none;
  align-items: center;
  gap: 2px;
  padding: 4px 6px;
  background: #fff;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  z-index: 500;
  white-space: nowrap;
}
.floating-toolbar.visible { display: flex; }
.ft-btn {
  width: 30px; height: 28px;
  border: none; background: transparent;
  cursor: pointer; color: #6B7280;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px;
  transition: all 0.15s;
  font-size: 13px; font-weight: 500;
  position: relative;
}
.ft-btn:hover { background: #F3F4F6; color: #1F2937; }
.ft-btn.active { background: #DBEAFE; color: #2563EB; }
.ft-sep {
  width: 1px; height: 18px; background: #E5E7EB; margin: 0 2px;
}
.ft-select {
  height: 28px; border: 1px solid #E5E7EB; border-radius: 4px;
  font-size: 12px; color: #4B5563; background: #fff;
  padding: 0 6px; cursor: pointer; outline: none;
}
.ft-select:hover { border-color: #2563EB; }

/* AI dropdown */
.ai-dropdown {
  position: absolute;
  left: 0; top: 34px;
  background: #fff;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  display: none;
  min-width: 130px;
  padding: 4px;
  z-index: 600;
}
.ai-dropdown.show { display: block; }
.ai-dropdown-item {
  padding: 8px 14px;
  font-size: 13px; color: #4B5563;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.ai-dropdown-item:hover { background: #EFF6FF; color: #2563EB; }

/* Report document styles */
.report-doc-title {
  font-size: 20px; font-weight: 700; color: #1F2937;
  text-align: center; margin-bottom: 28px;
}
.report-chapter {
  font-size: 16px; font-weight: 600; color: #1F2937;
  margin: 24px 0 16px;
}
.report-chapter:first-child { margin-top: 0; }
.report-section-title {
  font-size: 14px; font-weight: 600; color: #1F2937;
  margin: 16px 0 8px;
}
.report-text {
  font-size: 14px; color: #374151; line-height: 1.8;
  margin-bottom: 12px;
}
.report-text p { margin-bottom: 8px; }

/* Report table */
.report-table-wrap {
  margin: 12px 0 16px;
}
.report-table-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: #6B7280; margin-bottom: 6px;
}
.report-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.report-table th {
  background: #F9FAFB;
  color: #1F2937; font-weight: 500;
  padding: 8px 10px;
  text-align: center;
  border: 1px solid #E5E7EB;
}
.report-table td {
  padding: 8px 10px;
  border: 1px solid #E5E7EB;
  color: #4B5563;
  text-align: center;
}
.report-table tr:hover td { background: #F9FAFB; }

.report-footer {
  padding: 8px 20px 12px;
  border-top: 1px solid #E5E7EB;
}
.report-footer-toolbar {
  display: flex; align-items: center; gap: 0;
}

/* Report loading skeleton */
.skeleton-block {
  background: linear-gradient(90deg, #F3F4F6 25%, #E5E7EB 50%, #F3F4F6 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 4px;
  margin-bottom: 12px;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Context Menu */
.context-menu {
  position: fixed;
  background: #fff;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  z-index: 1000;
  display: none;
  min-width: 120px;
  padding: 4px;
}
.context-menu-item {
  padding: 8px 16px;
  font-size: 14px; color: #4B5563;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: 6px;
}
.context-menu-item:hover { background: #F3F4F6; color: #2563EB; }
.context-menu-item.danger { color: #EF4444; }
.context-menu-item.danger:hover { background: #FEF2F2; }

/* Dialog */
.dialog-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.2);
  z-index: 2000;
  display: none;
  align-items: center; justify-content: center;
}
.dialog-overlay.show { display: flex; }
.dialog-box {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
}
.dialog-title {
  font-size: 16px; font-weight: 500; color: #1F2937;
  margin-bottom: 12px;
}
.dialog-content {
  font-size: 14px; color: #4B5563;
  margin-bottom: 20px;
}
.dialog-actions {
  display: flex; justify-content: flex-end; gap: 8px;
}
.dialog-actions button {
  height: 36px; padding: 0 20px;
  border-radius: 8px; font-size: 14px;
  cursor: pointer; transition: all 0.2s;
}
.btn-dialog-cancel {
  background: #fff; color: #4B5563;
  border: 1px solid #E5E7EB;
}
.btn-dialog-cancel:hover { background: #F3F4F6; }
.btn-dialog-confirm {
  background: #EF4444; color: #fff; border: none;
}
.btn-dialog-confirm:hover { background: #DC2626; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #D1D5DB; }
</style>

<script>
// ========== State ==========
let isGenerating = false;
let currentChatId = null;
let deleteTargetId = null;
let currentAgent = null; // null = default

// ========== Agent Suggestions ==========
const agentSuggestions = {
  '默认': [
    '近一个月燃气专项的预警趋势如何？',
    '帮我生成上个月的燃气专项安全运行月报。',
    '帮我生成上个月的燃气二级以上的报警点位清单表。',
    '城市生命线涵盖哪些领域？',
    '介绍一下领导驾驶舱。',
    '帮我打开燃气管网风险图层。',
  ],
  '知识问答': [
    '液化气安全监管平台详细报价',
    '排水安全业务的核心优势有哪些？',
    '燃气领域的预警成效案例有哪些？',
    '可燃气体智能监测仪的安装工艺',
    '燃气管网监测布点规范',
  ],
  '系统问答': [
    '近一周的燃气专项预警总数？',
    '上个月全市监测设备的在线率趋势如何？',
    '各单位的预警处置效率排名？',
    '目前各行业累计的预警数量占比？',
    '全市各个区域的预警数量分布？',
    '目前还未解除的预警有哪些？请帮我一一列举',
  ],
  '智能报告': [
    '生成上个月的燃气专项安全运行月报',
    '生成上个月的排水专项安全运行月报',
    '生成上个月的桥梁专项安全运行月报',
    '生成上个月的供水专项安全运行月报',
  ],
  '智能报表': [
    '生成上个月的燃气二级以上报警点位清单表',
    '生成本季度各专项预警数量统计报表',
    '生成全市监测设备在线率月度报表',
    '生成各区域报警处置时效汇总表',
  ],
  '系统巡检': [
    '启动全系统智能巡检',
    '检查燃气专项监测设备运行状态',
    '巡检全市各区域数据采集链路',
    '检查本月离线设备及异常传感器',
  ],
  '分析决策': [
    '对当前报警数据进行分析研判',
    '分析近三个月预警趋势变化原因',
    '城北片区管网风险综合评估',
    '基于历史数据预测下月报警趋势',
  ],
};

function getSuggestionsForAgent(agent) {
  const key = agent || '默认';
  return agentSuggestions[key] || agentSuggestions['默认'];
}

// ========== Render Suggestions ==========
function renderSuggestions(list) {
  const container = document.getElementById('welcomeSuggestions');
  container.innerHTML = list.map(text => `
    <div class="welcome-suggestion-item" onclick="sendQuickQ('${text}')">
      <svg class="welcome-suggestion-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="2" width="10" height="12" rx="1"/><line x1="5" y1="5" x2="11" y2="5"/><line x1="5" y1="7.5" x2="11" y2="7.5"/><line x1="5" y1="10" x2="9" y2="10"/></svg>
      ${text}
    </div>
  `).join('');
}

function refreshSuggestions() {
  const pool = getSuggestionsForAgent(currentAgent);
  const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, 5);
  renderSuggestions(shuffled);
}

// ========== Switch Agent ==========
function switchAgent(agentName) {
  currentAgent = agentName;
  // Clear chat
  const chatArea = document.getElementById('chatArea');
  chatArea.querySelectorAll('.chat-msg').forEach(m => m.remove());
  // Show welcome
  document.getElementById('welcomeCard').style.display = '';
  // Render agent-specific suggestions
  const suggestions = getSuggestionsForAgent(agentName);
  renderSuggestions(suggestions);
  // Show agent tag in input
  updateAgentTag();
  // Close report if open
  closeReport();
}

function clearAgent() {
  currentAgent = null;
  updateAgentTag();
  // Reset to default welcome
  const chatArea = document.getElementById('chatArea');
  chatArea.querySelectorAll('.chat-msg').forEach(m => m.remove());
  document.getElementById('welcomeCard').style.display = '';
  renderSuggestions(getSuggestionsForAgent(null));
}

function updateAgentTag() {
  const area = document.getElementById('agentTagArea');
  if (currentAgent) {
    area.innerHTML = `<span class="input-agent-tag">${currentAgent}<button class="tag-close" onclick="clearAgent()"><svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 2l6 6M8 2l-6 6"/></svg></button></span>`;
  } else {
    area.innerHTML = '';
  }
}

function newChat() {
  currentAgent = null;
  updateAgentTag();
  document.getElementById('welcomeCard').style.display = '';
  const chatArea = document.getElementById('chatArea');
  chatArea.querySelectorAll('.chat-msg').forEach(m => m.remove());
  document.querySelectorAll('.history-item').forEach(i => i.classList.remove('active'));
  document.getElementById('inputBox').value = '';

// ========== Send Message ==========
function sendMessage(openReport) {
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if (!text || isGenerating) return;

  document.getElementById('welcomeCard').style.display = 'none';
  addUserBubble(text);
  input.value = '';
  input.style.height = 'auto';

  const agentAtSend = currentAgent; // capture current agent
  isGenerating = true;
  const typingEl = addTypingIndicator();

  // Determine if should open report
  const shouldOpenReport = openReport || (agentAtSend === '智能报告') || (agentAtSend === '智能报表');

  setTimeout(() => {
    typingEl.remove();
    isGenerating = false;

    if (shouldOpenReport || text.includes('月报') || text.includes('报表')) {
      const reportTitle = text.includes('报表') ? '监测数据统计报表' :
                          text.includes('PPT') ? '运营数据展示PPT' : '燃气监测运营月度报告';
      addAIResponseWithReport(text, reportTitle, agentAtSend);
      openReportPanel(reportTitle);
    } else if (text.includes('运行状态') || text.includes('管网')) {
      addAIDataResponse(agentAtSend);
    } else if (text.includes('报警')) {
      addAITextResponse(
        '今日共收到 <strong>3条</strong> 报警信息：\n\n1. 【压力异常】城北片区B12监测点压力低于阈值（<span style="color:#EF4444">0.15MPa</span>），已持续2小时\n2. 【流量异常】城东DN800主管流量突增（<span style="color:#F59E0B">+35%</span>），疑似用水高峰\n3. 【设备离线】城南片区S05流量计通信中断（<span style="color:#EF4444">已离线4小时</span>）',
        [
          { label: '生成详细报警分析报告', action: () => openReportPanel('报警分析报告') },
          { label: '查看各区域报警分布', action: () => {} },
          { label: '导出报警记录', action: () => {} }
        ],
        agentAtSend
      );
    } else {
      addAITextResponse(
        '已收到您的问题，正在分析中。根据系统数据分析结果如下：\n\n当前城市生命线各子系统运行平稳，未发现重大异常。如需进一步了解某个子系统的详细数据，请告诉我具体方向。',

          { label: '生成综合分析报告', action: () => openReportPanel('综合分析报告') },

function downloadReport(format) {
  document.getElementById('downloadDropdown').classList.remove('show');
  const title = document.getElementById('reportTitle').textContent || '报告';
  const body = document.getElementById('reportBody');
  const content = body.innerHTML;

  // Build HTML document for Word/WPS
  const htmlDoc = `
<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns="http://www.w3.org/TR/REC-html40">
<head>
  <meta charset="utf-8">
  <title>${title}</title>
  <!--[if gte mso 9]>
  <xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml>
  <![endif]-->
  <style>
    body { font-family: "Microsoft YaHei", "SimSun", sans-serif; font-size: 14px; color: #333; line-height: 1.8; padding: 40px; }
    table { border-collapse: collapse; width: 100%; margin: 12px 0; }
    th, td { border: 1px solid #d1d5db; padding: 8px 12px; text-align: center; font-size: 13px; }
    th { background: #f3f4f6; font-weight: 600; }
    tr:nth-child(even) td { background: #f9fafb; }
    h1 { font-size: 22px; text-align: center; margin-bottom: 24px; }
    h2 { font-size: 17px; color: #1f2937; margin: 20px 0 10px; border-bottom: 1px solid #e5e7eb; padding-bottom: 6px; }
    h3 { font-size: 15px; color: #374151; margin: 14px 0 8px; }
    strong { color: #1f2937; }
  </style>
</head>
<body>${content}</body>
</html>`;

  const ext = format === 'wps' ? 'wps' : 'docx';
  const mimeType = 'application/msword';
  const blob = new Blob(['\ufeff' + htmlDoc], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = title + '.' + ext;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // Show success toast
  showDownloadToast(title, ext);
}

  toast.innerHTML = '✅ 「' + title + '.' + ext + '」已开始下载';
  toast.style.opacity = '1';

// Show floating toolbar on click/selection inside report body
document.addEventListener('DOMContentLoaded', () => {
  const reportBody = document.getElementById('reportBody');
  const toolbar = document.getElementById('floatingToolbar');
  const container = reportBody.closest('[style*="position:relative"]') || reportBody.parentElement;

  reportBody.addEventListener('mouseup', (e) => {
    setTimeout(() => showFloatingToolbar(e), 10);
  });

  reportBody.addEventListener('click', (e) => {
    setTimeout(() => showFloatingToolbar(e), 10);
  });

  function showFloatingToolbar(e) {
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;
    const range = sel.getRangeAt(0);
    const rect = range.getBoundingClientRect();
    const containerRect = container.getBoundingClientRect();

    // Position above the click/selection
    let top, left;
    if (sel.toString().length > 0) {
      // Has selection - show above selection
      top = rect.top - containerRect.top - 40;
      left = rect.left - containerRect.left + (rect.width / 2) - 140;
    } else {
      // Just clicked - show above click point
      top = e.clientY - containerRect.top - 40;
      left = e.clientX - containerRect.left - 140;
    }
    top = Math.max(4, top);
    left = Math.max(4, Math.min(left, containerRect.width - 320));

    toolbar.style.top = top + 'px';
    toolbar.style.left = left + 'px';
    toolbar.classList.add('visible');
  }

  // Hide toolbar when clicking outside report area
  document.addEventListener('mousedown', (e) => {
    if (!toolbar.contains(e.target) && !reportBody.contains(e.target)) {
      toolbar.classList.remove('visible');
      document.getElementById('aiDropdown').classList.remove('show');
    }
  });

  // Hide AI dropdown on outside click
  document.addEventListener('click', (e) => {
    if (!document.getElementById('ftAiBtn').contains(e.target)) {

// ========== Context Menu ==========
function showContextMenu(e, chatId) {
  e.preventDefault();
  const menu = document.getElementById('contextMenu');
  menu.style.display = 'block';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  deleteTargetId = chatId;
}
document.addEventListener('click', () => {
  document.getElementById('contextMenu').style.display = 'none';
});

function confirmDeleteChat() {
  document.getElementById('contextMenu').style.display = 'none';
  document.getElementById('deleteDialog').classList.add('show');
}
function closeDialog() {
  document.getElementById('deleteDialog').classList.remove('show');
}
function deleteChat() {
  if (deleteTargetId) {
    const item = document.querySelector(`.history-item[data-id="${deleteTargetId}"]`);
    if (item) item.remove();
    deleteTargetId = null;
  }
  closeDialog();
}
function renameChat() {
  const item = document.querySelector(`.history-item[data-id="${deleteTargetId}"]`);
  if (item) {
    const titleEl = item.querySelector('.history-item-title');
    const newName = prompt('重命名会话：', titleEl.textContent);
    if (newName && newName.trim()) titleEl.textContent = newName.trim();
  }
  document.getElementById('contextMenu').style.display = 'none';
}

// ========== Switch Chat ==========
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.history-item').forEach(item => {
    item.addEventListener('click', function() {
      document.querySelectorAll('.history-item').forEach(i => i.classList.remove('active'));
      this.classList.add('active');
      currentChatId = this.dataset.id;
      document.getElementById('welcomeCard').style.display = 'none';
      const chatArea = document.getElementById('chatArea');
      chatArea.querySelectorAll('.chat-msg').forEach(m => m.remove());
      const title = this.querySelector('.history-item-title').textContent;
      addUserBubble(title);
      addAITextResponse('已为您加载该会话的历史记录。当前会话主题：<strong>' + title + '</strong>。请继续提问或选择功能。', [
        { label: '查看详细记录', action: () => {} },
        { label: '基于此主题继续分析', action: () => {} }
      ]);
    });
  });
});
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>城市生命线安全运行监测AI助手</title>
<style>
/* ========== Reset & Base ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Inter", "Microsoft YaHei", "PingFang SC", -apple-system, sans-serif;
  font-size: 14px;
  color: #4B5563;
  line-height: 1.5;
  background: #FFFFFF;
  min-width: 1280px;
  overflow: hidden;
  height: 100vh;
}

/* ========== Layout ========== */
.app-layout {
  display: flex;
  height: 100vh;
  width: 100%;
}

/* ========== Left Sidebar ========== */
.sidebar {
  width: 260px;
  min-width: 260px;
  background: #F9FAFB;
  border-right: 1px solid #E5E7EB;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.sidebar-header {
  padding: 16px 16px 12px;
  display: flex; align-items: center; gap: 10px;
}
.sidebar-logo-icon {
  width: 32px; height: 32px;
  background: #2563EB;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: 600;
  flex-shrink: 0;
}
.sidebar-brand {
  display: flex; flex-direction: column;
}
.sidebar-title {
  font-size: 16px; font-weight: 600; color: #1F2937; line-height: 1.3;
}
.sidebar-subtitle {
  font-size: 12px; color: #9CA3AF; line-height: 1.2;
}

.sidebar-actions {
  padding: 0 12px 8px;
}
.btn-new-chat {
  height: 36px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: all 0.2s;
  border: 1px solid #E5E7EB;
  width: 100%;
  background: #fff; color: #2563EB; font-weight: 500;
}
.btn-new-chat:hover { background: #EFF6FF; border-color: #2563EB; }

.sidebar-nav {
  padding: 8px 12px;
}
.nav-item {
  padding: 8px 12px;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; color: #4B5563;
  transition: all 0.2s;
  border-radius: 8px;
  margin-bottom: 2px;
  text-decoration: none;
}
.nav-item:hover { background: #F3F4F6; color: #2563EB; }
.nav-item.active { background: #EFF6FF; color: #2563EB; }
.nav-item svg { flex-shrink: 0; }

.sidebar-history {
  flex: 1;
  overflow-y: auto;
  padding: 0 0 8px;
}
.history-group-label {
  font-size: 12px; color: #9CA3AF;
  padding: 12px 16px 4px; font-weight: 500;
}
.history-item {
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 8px;
  margin: 0 8px;
  border-radius: 8px;
  font-size: 14px; color: #4B5563;
}
.history-item:hover { background: #F3F4F6; }
.history-item.active { background: #EFF6FF; color: #2563EB; }
.history-item svg { flex-shrink: 0; color: #9CA3AF; }
.history-item.active svg { color: #2563EB; }
.history-item-title {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid #E5E7EB;
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 32px; height: 32px;
  background: #2563EB; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: 600;
  flex-shrink: 0;
}
.user-info-name { font-size: 14px; color: #1F2937; font-weight: 500; }

/* ========== Main Area ========== */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh;
  min-width: 0;
  background: #FFFFFF;
  transition: flex 0.3s ease;
}
.app-layout.report-open .main-area {
  flex: 4;
}

/* Top bar - minimal */
.top-bar {
  height: 48px; min-height: 48px;
  display: flex; align-items: center; justify-content: flex-end;
  padding: 0 20px;
  border-bottom: 1px solid #E5E7EB;
}
.top-bar-actions {
  display: flex; align-items: center; gap: 12px;
}
.top-bar-icon {
  width: 32px; height: 32px; cursor: pointer;
  color: #9CA3AF; transition: color 0.2s;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
}
.top-bar-icon:hover { color: #4B5563; background: #F3F4F6; }
.online-indicator {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: #9CA3AF;
  margin-right: auto;
}
.online-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #10B981;
}

/* ========== Chat Area ========== */
.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  display: flex;
  flex-direction: column;
}
.chat-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 24px 60px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.chat-scroll .chat-msg {
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
}

/* Welcome Card */
.welcome-card {
  max-width: 800px;
  margin: 0 auto;
  width: 100%;
  padding: 40px 0 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.welcome-hero {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 48px;
  margin-top: 40px;
}
.welcome-robot {
  width: 120px;
  height: 120px;
  flex-shrink: 0;
}
.welcome-robot img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.welcome-greeting {
  font-size: 28px;
  font-weight: 700;
  color: #1F2937;
  white-space: nowrap;
}

.welcome-try-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  margin-bottom: 16px;
}
.welcome-try-label {
  font-size: 14px;
  color: #6B7280;
}
.welcome-refresh-btn {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px; color: #9CA3AF;
  cursor: pointer; background: none; border: none;
  transition: color 0.2s;
}
.welcome-refresh-btn:hover { color: #2563EB; }
.welcome-suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  width: 100%;
}
.welcome-suggestion-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  background: #F9FAFB;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  font-size: 14px;
  color: #374151;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.welcome-suggestion-item:hover {
  background: #EFF6FF;
  border-color: #BFDBFE;
  color: #2563EB;
}
.welcome-suggestion-icon {
  color: #9CA3AF;
  flex-shrink: 0;
}

/* Agent tag in input box - positioned top-left inside input-wrapper */
.input-agent-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #EFF6FF;
  color: #2563EB;
  font-size: 12px;
  font-weight: 500;
  padding: 3px 8px 3px 10px;
  border-radius: 4px;
  margin: 10px 0 0 12px;
}
.input-agent-tag .tag-close {
  width: 16px; height: 16px;
  border: none; background: none;
  cursor: pointer; color: #93C5FD;
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px; transition: all 0.15s;
  padding: 0;
}
.input-agent-tag .tag-close:hover { color: #2563EB; background: #DBEAFE; }

/* Agent badge in AI reply */
.agent-badge-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.agent-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  background: #EFF6FF;
  color: #2563EB;
  font-size: 12px;
  font-weight: 500;
  border-radius: 4px;
}
.agent-badge-text {
  font-size: 13px;
  color: #6B7280;
}

/* Thinking process section */
.thinking-section {
  margin: 8px 0 12px;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  overflow: hidden;
}
.thinking-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  background: #F9FAFB;
  cursor: pointer;
  font-size: 13px;
  color: #6B7280;
  user-select: none;
  transition: background 0.15s;
}
.thinking-header:hover { background: #F3F4F6; }
.thinking-header svg { flex-shrink: 0; transition: transform 0.2s; }
.thinking-header.collapsed svg { transform: rotate(-90deg); }
.thinking-header .thinking-label { font-weight: 500; color: #4B5563; }
.thinking-header .thinking-duration { margin-left: auto; font-size: 12px; color: #9CA3AF; }
.thinking-body {
  padding: 10px 14px;
  font-size: 13px;
  color: #6B7280;
  line-height: 1.7;
  border-top: 1px solid #E5E7EB;
  background: #FAFBFC;
}
.thinking-body.hidden { display: none; }

/* Chat Messages */
.chat-msg {
  display: flex;
  gap: 0;
  max-width: 100%;
}
.chat-msg.user {
  justify-content: flex-end;
}
.chat-msg.ai {
  justify-content: flex-start;
}
.msg-bubble {
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 14px; line-height: 1.6;
  max-width: 75%;
}
.msg-bubble.user-bubble {
  background: #2563EB; color: #FFFFFF;
  border-radius: 8px 8px 2px 8px;
}
.msg-bubble.ai-bubble {
  background: transparent; color: #4B5563;
  padding: 0;
  max-width: 100%;
}
.ai-content {
  font-size: 14px; line-height: 1.7; color: #374151;
}
.ai-content strong { color: #1F2937; }

/* Report Card in chat (like document preview) */
.report-card-inline {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: #F9FAFB;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  margin: 12px 0;
  cursor: pointer;
  transition: all 0.2s;
  max-width: 420px;
}
.report-card-inline:hover {
  background: #EFF6FF; border-color: #BFDBFE;
}
.report-card-icon {
  width: 36px; height: 36px;
  background: #EFF6FF;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: #2563EB; font-size: 18px;
  flex-shrink: 0;
}
.report-card-info {
  flex: 1; min-width: 0;
}
.report-card-title {
  font-size: 14px; color: #1F2937; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.report-card-meta {
  font-size: 12px; color: #9CA3AF;
}
.report-card-thumb {
  width: 64px; height: 48px;
  background: #F3F4F6;
  border-radius: 4px;
  border: 1px solid #E5E7EB;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: #9CA3AF;
  flex-shrink: 0;
  overflow: hidden;
}
.report-card-thumb-inner {
  width: 100%; height: 100%;
  padding: 4px;
  font-size: 7px; color: #9CA3AF; line-height: 1.2;
  overflow: hidden;
}

/* Switch to direct reply link */
.switch-reply-link {
  font-size: 13px; color: #2563EB; cursor: pointer;
  margin: 4px 0 8px;
  display: inline-flex; align-items: center; gap: 2px;
}
.switch-reply-link:hover { text-decoration: underline; }

/* AI Action Buttons Row */
.ai-actions-row {
  display: flex; align-items: center; gap: 8px; margin-top: 10px;
  padding-top: 2px;
}
.ai-action-btn {
  width: 28px; height: 28px;
  border: none; background: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #9CA3AF; border-radius: 6px;
  transition: all 0.15s;
}
.ai-action-btn:hover { color: #4B5563; background: #F3F4F6; }
.ai-actions-sep {
  width: 1px; height: 16px; background: #E5E7EB;
}
.ai-ref-count {
  font-size: 12px; color: #9CA3AF; margin-left: 4px;
}

/* Suggestion Buttons below AI response */
.ai-suggestions {
  display: flex; flex-direction: column; gap: 8px; margin-top: 14px;
}
.ai-suggest-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 8px 14px;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  background: #fff;
  font-size: 14px; color: #4B5563;
  cursor: pointer;
  transition: all 0.2s;
  width: fit-content;
}
.ai-suggest-btn:hover {
  background: #EFF6FF; color: #2563EB; border-color: #BFDBFE;
}
.ai-suggest-btn .arrow {
  color: #9CA3AF; font-size: 12px; margin-left: 2px;
}

/* Data Card in AI bubble */
.data-card {
  background: #FFFFFF;
  border-radius: 8px;
  padding: 12px 16px;
  margin-top: 12px;
  border: 1px solid #E5E7EB;
}
.data-card-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 0;
}
.data-card-row:not(:last-child) {
  border-bottom: 1px solid #E5E7EB;
}
.data-label { font-size: 14px; color: #4B5563; }
.data-value { font-size: 18px; font-weight: 600; color: #2563EB; }
.data-trend { font-size: 12px; margin-left: 6px; }
.data-trend.up { color: #EF4444; }
.data-trend.down { color: #10B981; }

/* Typing indicator */
.typing-indicator {
  display: flex; align-items: center; gap: 4px;
  color: #3B82F6; font-size: 14px;
}
.typing-dot {
  width: 6px; height: 6px;
  background: #3B82F6; border-radius: 50%;
  animation: blink 1.4s infinite both;
}
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.3; }
  40% { opacity: 1; }
}

/* ========== Bottom Input Area ========== */
.input-area {
  background: #FFFFFF;
  padding: 12px 60px 16px;
}
.input-wrapper {
  border: 1px solid #E5E7EB;
  border-radius: 12px;
  background: #FFFFFF;
  padding: 0;
  transition: border-color 0.2s, box-shadow 0.2s;
  max-width: 800px;
  margin: 0 auto;
}
.input-wrapper:focus-within {
  border-color: #BFDBFE;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.08);
}
.input-box {
  width: 100%;
  min-height: 44px; max-height: 120px;
  border: none;
  padding: 12px 16px 4px;
  font-size: 14px; color: #374151;
  background: transparent;
  resize: none;
  font-family: inherit;
  line-height: 1.5;
  outline: none;
}
.input-box::placeholder { color: #D1D5DB; }
.input-toolbar {
  display: flex; align-items: center; gap: 0;
  padding: 4px 8px 8px;
  flex-wrap: wrap;
}
.toolbar-btn {
  height: 30px;
  padding: 0 10px;
  border: none;
  background: none;
  font-size: 13px; color: #9CA3AF;
  cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  border-radius: 6px;
  transition: all 0.15s;
  white-space: nowrap;
}
.toolbar-btn:hover { color: #4B5563; background: #F3F4F6; }
.toolbar-sep {
  width: 1px; height: 16px; background: #E5E7EB;
  margin: 0 4px;
}
.toolbar-spacer { flex: 1; }
.btn-mic {
  width: 30px; height: 30px;
  border: none; background: none;
  color: #9CA3AF; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  transition: all 0.15s;
}
.btn-mic:hover { color: #4B5563; background: #F3F4F6; }

/* ========== Right Report Panel ========== */
.report-panel {
  width: 0;
  flex: 0;
  overflow: hidden;
  background: #FFFFFF;
  border-left: 1px solid #E5E7EB;
  transition: flex 0.3s ease, width 0.3s ease;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.report-panel.open {
  flex: 6;
  width: auto;
  min-width: 0;
}

/* When report is open, collapse extra toolbar buttons to keep one line */
.app-layout.report-open .toolbar-btn.collapsible {
  display: none;
}
.app-layout.report-open .input-toolbar {
  flex-wrap: nowrap;
}
.report-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid #E5E7EB;
  min-height: 48px;
}
.report-title-main {
  font-size: 16px; font-weight: 600; color: #1F2937;
  white-space: nowrap;
}
.report-header-actions {
  display: flex; gap: 4px;
}
.report-header-actions button {
  width: 28px; height: 28px;
  border: none; border-radius: 8px;
  background: transparent; cursor: pointer;
  color: #9CA3AF;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.report-header-actions button:hover {
  background: #F3F4F6; color: #4B5563;
}

/* Report panel split: TOC + Content */
.report-split {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* TOC sidebar */
.report-toc {
  width: 200px;
  min-width: 200px;
  border-right: 1px solid #E5E7EB;
  background: #F9FAFB;
  overflow-y: auto;
  padding: 16px 0;
  transition: width 0.25s ease, min-width 0.25s ease, padding 0.25s ease, opacity 0.2s ease;
}
.report-toc.collapsed {
  width: 0;
  min-width: 0;
  padding: 0;
  border-right: none;
  overflow: hidden;
  opacity: 0;
}
.report-toc-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px 12px;
  border-bottom: 1px solid #E5E7EB;
  margin-bottom: 8px;
}
.report-toc-title {
  font-size: 13px;
  font-weight: 600;
  color: #1F2937;
}
.toc-toggle-btn {
  width: 22px; height: 22px;
  border: none; background: none;
  cursor: pointer; color: #9CA3AF;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px; transition: all 0.15s;
}
.toc-toggle-btn:hover { color: #4B5563; background: #E5E7EB; }
/* Expand button shown when TOC is collapsed */
.toc-expand-btn {
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 20px; height: 40px;
  border: 1px solid #E5E7EB;
  border-left: none;
  border-radius: 0 6px 6px 0;
  background: #F9FAFB;
  cursor: pointer; color: #9CA3AF;
  display: none;
  align-items: center; justify-content: center;
  z-index: 10;
  transition: all 0.15s;
}
.toc-expand-btn:hover { color: #2563EB; background: #EFF6FF; }
.toc-expand-btn.visible { display: flex; }
/* Download dropdown */
.download-dropdown {
  position: absolute;
  top: 100%; right: 0;
  background: #fff;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  padding: 4px 0;
  display: none;
  z-index: 600;
  min-width: 160px;
}
.download-dropdown.show { display: block; }
.download-dropdown-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  font-size: 13px; color: #374151;
  cursor: pointer; transition: all 0.15s;
  white-space: nowrap;
}
.download-dropdown-item:hover { background: #EFF6FF; color: #2563EB; }
.download-dropdown-item svg { flex-shrink: 0; }
.toc-item {
  display: block;
  padding: 8px 16px;
  font-size: 13px;
  color: #4B5563;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 2px solid transparent;
  text-decoration: none;
}
.toc-item:hover {
  background: #F3F4F6;
  color: #2563EB;
}
.toc-item.active {
  background: #EFF6FF;
  color: #2563EB;
  border-left-color: #2563EB;
  font-weight: 500;
}
.toc-item.sub {
  padding-left: 28px;
  font-size: 12px;
}

/* Report content area */
.report-content-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px;
  min-width: 0;
  outline: none;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

/* Floating toolbar */
.floating-toolbar {
  position: absolute;
  display: none;
  align-items: center;
  gap: 2px;
  padding: 4px 6px;
  background: #fff;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  z-index: 500;
  white-space: nowrap;
}
.floating-toolbar.visible { display: flex; }
.ft-btn {
  width: 30px; height: 28px;
  border: none; background: transparent;
  cursor: pointer; color: #6B7280;
  display: flex; align-items: center; justify-content: center;
  border-radius: 4px;
  transition: all 0.15s;
  font-size: 13px; font-weight: 500;
  position: relative;
}
.ft-btn:hover { background: #F3F4F6; color: #1F2937; }
.ft-btn.active { background: #DBEAFE; color: #2563EB; }
.ft-sep {
  width: 1px; height: 18px; background: #E5E7EB; margin: 0 2px;
}
.ft-select {
  height: 28px; border: 1px solid #E5E7EB; border-radius: 4px;
  font-size: 12px; color: #4B5563; background: #fff;
  padding: 0 6px; cursor: pointer; outline: none;
}
.ft-select:hover { border-color: #2563EB; }

/* AI dropdown */
.ai-dropdown {
  position: absolute;
  left: 0; top: 34px;
  background: #fff;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.10);
  display: none;
  min-width: 130px;
  padding: 4px;
  z-index: 600;
}
.ai-dropdown.show { display: block; }
.ai-dropdown-item {
  padding: 8px 14px;
  font-size: 13px; color: #4B5563;
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.ai-dropdown-item:hover { background: #EFF6FF; color: #2563EB; }

/* Report document styles */
.report-doc-title {
  font-size: 20px; font-weight: 700; color: #1F2937;
  text-align: center; margin-bottom: 28px;
}
.report-chapter {
  font-size: 16px; font-weight: 600; color: #1F2937;
  margin: 24px 0 16px;
}
.report-chapter:first-child { margin-top: 0; }
.report-section-title {
  font-size: 14px; font-weight: 600; color: #1F2937;
  margin: 16px 0 8px;
}
.report-text {
  font-size: 14px; color: #374151; line-height: 1.8;
  margin-bottom: 12px;
}
.report-text p { margin-bottom: 8px; }

/* Report table */
.report-table-wrap {
  margin: 12px 0 16px;
}
.report-table-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: #6B7280; margin-bottom: 6px;
}
.report-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.report-table th {
  background: #F9FAFB;
  color: #1F2937; font-weight: 500;
  padding: 8px 10px;
  text-align: center;
  border: 1px solid #E5E7EB;
}
.report-table td {
  padding: 8px 10px;
  border: 1px solid #E5E7EB;
  color: #4B5563;
  text-align: center;
}
.report-table tr:hover td { background: #F9FAFB; }

.report-footer {
  padding: 8px 20px 12px;
  border-top: 1px solid #E5E7EB;
}
.report-footer-toolbar {
  display: flex; align-items: center; gap: 0;
}

/* Report loading skeleton */
.skeleton-block {
  background: linear-gradient(90deg, #F3F4F6 25%, #E5E7EB 50%, #F3F4F6 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 4px;
  margin-bottom: 12px;
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* Context Menu */
.context-menu {
  position: fixed;
  background: #fff;
  border: 1px solid #E5E7EB;
  border-radius: 8px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  z-index: 1000;
  display: none;
  min-width: 120px;
  padding: 4px;
}
.context-menu-item {
  padding: 8px 16px;
  font-size: 14px; color: #4B5563;
  cursor: pointer;
  transition: all 0.15s;
  border-radius: 6px;
}
.context-menu-item:hover { background: #F3F4F6; color: #2563EB; }
.context-menu-item.danger { color: #EF4444; }
.context-menu-item.danger:hover { background: #FEF2F2; }

/* Dialog */
.dialog-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.2);
  z-index: 2000;
  display: none;
  align-items: center; justify-content: center;
}
.dialog-overlay.show { display: flex; }
.dialog-box {
  background: #fff;
  border-radius: 12px;
  padding: 24px;
  width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.12);
}
.dialog-title {
  font-size: 16px; font-weight: 500; color: #1F2937;
  margin-bottom: 12px;
}
.dialog-content {
  font-size: 14px; color: #4B5563;
  margin-bottom: 20px;
}
.dialog-actions {
  display: flex; justify-content: flex-end; gap: 8px;
}
.dialog-actions button {
  height: 36px; padding: 0 20px;
  border-radius: 8px; font-size: 14px;
  cursor: pointer; transition: all 0.2s;
}
.btn-dialog-cancel {
  background: #fff; color: #4B5563;
  border: 1px solid #E5E7EB;
}
.btn-dialog-cancel:hover { background: #F3F4F6; }
.btn-dialog-confirm {
  background: #EF4444; color: #fff; border: none;
}
.btn-dialog-confirm:hover { background: #DC2626; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #D1D5DB; }

/* ========== System Q&A Result Card ========== */
.sqa-result-card {
  background: #fff;
  border: 1px solid #E5E7EB;
  border-radius: 12px;
  overflow: hidden;
  margin: 12px 0;
}
.sqa-filter-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 10px 16px;
  background: #F9FAFB;
  border-bottom: 1px solid #E5E7EB;
  font-size: 13px; color: #4B5563;
}
.sqa-filter-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px;
  background: #EFF6FF; color: #2563EB;
  border-radius: 4px; font-size: 12px; font-weight: 500;
}
.sqa-filter-tag svg { flex-shrink: 0; }

/* KPI Card */
.sqa-kpi-card {
  display: flex; align-items: center; justify-content: center;
  padding: 32px 24px;
}
.sqa-kpi-inner {
  text-align: center;
}
.sqa-kpi-label {
  font-size: 14px; color: #6B7280; margin-bottom: 8px;
}
.sqa-kpi-value {
  font-size: 48px; font-weight: 700; color: #2563EB; line-height: 1.2;
}
.sqa-kpi-unit {
  font-size: 18px; font-weight: 400; color: #6B7280; margin-left: 4px;
}
.sqa-kpi-trend {
  font-size: 13px; margin-top: 8px;
}
.sqa-kpi-trend.up { color: #EF4444; }
.sqa-kpi-trend.down { color: #10B981; }

/* Line Chart */
.sqa-chart-area {
  padding: 16px 20px;
  min-height: 200px;
}
.sqa-chart-title {
  font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 12px;
}
.sqa-line-chart {
  position: relative; width: 100%; height: 180px;
  border-left: 1px solid #E5E7EB;
  border-bottom: 1px solid #E5E7EB;
}
.sqa-line-chart svg { width: 100%; height: 100%; }
.sqa-chart-labels {
  display: flex; justify-content: space-between;
  padding: 4px 0 0;
  font-size: 11px; color: #9CA3AF;
}
.sqa-chart-y-labels {
  position: absolute; left: -36px; top: 0; bottom: 0;
  display: flex; flex-direction: column-reverse; justify-content: space-between;
  font-size: 11px; color: #9CA3AF;
}

/* Bar Chart (horizontal) */
.sqa-bar-chart {
  padding: 16px 20px;
}
.sqa-bar-item {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.sqa-bar-label {
  width: 70px; font-size: 13px; color: #374151; text-align: right; flex-shrink: 0;
}
.sqa-bar-track {
  flex: 1; height: 24px; background: #F3F4F6; border-radius: 4px; overflow: hidden; position: relative;
}
.sqa-bar-fill {
  height: 100%; border-radius: 4px; transition: width 0.6s ease;
  display: flex; align-items: center; justify-content: flex-end; padding-right: 8px;
  font-size: 12px; font-weight: 600; color: #fff;
}
.sqa-bar-value {
  font-size: 13px; color: #4B5563; font-weight: 600; width: 60px; flex-shrink: 0;
}

/* Vertical Bar Chart */
.sqa-vbar-chart {
  padding: 16px 20px;
  display: flex; flex-direction: column;
}
.sqa-vbar-container {
  display: flex; align-items: flex-end; gap: 16px; height: 180px;
  border-bottom: 1px solid #E5E7EB;
  padding: 0 10px;
}
.sqa-vbar-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%;
  justify-content: flex-end;
}
.sqa-vbar-value {
  font-size: 12px; color: #2563EB; font-weight: 600; margin-bottom: 4px;
}
.sqa-vbar-bar {
  width: 32px; background: linear-gradient(180deg, #3B82F6, #60A5FA);
  border-radius: 4px 4px 0 0; transition: height 0.6s ease;
}
.sqa-vbar-label {
  font-size: 11px; color: #6B7280; margin-top: 6px; text-align: center;
}

/* Pie Chart */
.sqa-pie-chart {
  display: flex; align-items: center; gap: 32px; padding: 20px 24px;
}
.sqa-pie-svg { flex-shrink: 0; }
.sqa-pie-legend {
  display: flex; flex-direction: column; gap: 8px;
}
.sqa-pie-legend-item {
  display: flex; align-items: center; gap: 8px; font-size: 13px; color: #374151;
}
.sqa-pie-legend-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.sqa-pie-legend-pct {
  font-weight: 600; color: #1F2937; margin-left: auto;
}

/* Data Table in result */
.sqa-table-wrap {
  padding: 0 16px 16px;
  overflow-x: auto;
}
.sqa-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.sqa-table th {
  background: #F9FAFB; color: #374151; font-weight: 600;
  padding: 10px 12px; text-align: center; border: 1px solid #E5E7EB;
}
.sqa-table td {
  padding: 10px 12px; border: 1px solid #E5E7EB; color: #4B5563; text-align: center;
}
.sqa-table tr:hover td { background: #F9FAFB; }
.sqa-table .highlight-red { background: #FEF2F2; color: #DC2626; font-weight: 600; }
.sqa-table .highlight-yellow { background: #FFFBEB; color: #D97706; font-weight: 600; }

/* Analysis Summary */
.sqa-summary {
  padding: 14px 16px;
  background: #F0FDF4;
  border-top: 1px solid #E5E7EB;
  font-size: 13px; color: #374151; line-height: 1.7;
}
.sqa-summary-title {
  font-weight: 600; color: #059669; margin-bottom: 4px;
  display: flex; align-items: center; gap: 6px;
}

/* Recommended Questions */
.sqa-recommend {
  display: flex; flex-direction: column; gap: 6px; margin-top: 12px;
}
.sqa-recommend-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 8px 14px;
  border: 1px solid #E5E7EB; border-radius: 8px;
  background: #fff; font-size: 13px; color: #4B5563;
  cursor: pointer; transition: all 0.2s; width: fit-content;
}
.sqa-recommend-btn:hover {
  background: #EFF6FF; color: #2563EB; border-color: #BFDBFE;
}

/* Thinking steps detailed */
.thinking-steps { padding: 0; }
.thinking-step {
  padding: 8px 0;
  border-bottom: 1px solid #F3F4F6;
}
.thinking-step:last-child { border-bottom: none; }
.thinking-step-title {
  font-weight: 600; color: #374151; font-size: 13px;
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 6px;
}
.thinking-step-title .step-icon {
  width: 18px; height: 18px; border-radius: 50%;
  background: #DBEAFE; color: #2563EB;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0;
}
.thinking-step-content {
  font-size: 12px; color: #6B7280; line-height: 1.6;
  margin-left: 24px;
}
.thinking-step-content code {
  display: block;
  background: #1F2937; color: #A5F3FC; font-family: 'Courier New', monospace;
  padding: 8px 12px; border-radius: 6px; margin: 6px 0;
  font-size: 11px; line-height: 1.5; white-space: pre-wrap; overflow-x: auto;
}
.thinking-step-output {
  background: #F9FAFB; border-radius: 6px; padding: 6px 10px;
  margin: 4px 0 0 24px; font-size: 12px; color: #4B5563;
}
</style>
</head>

function matchSystemQA(text) {
  const keys = Object.keys(systemQAResponses);
  for (const key of keys) {
    const keywords = key.replace(/[？?。，]/g, '').split('');
    let matchCount = 0;
    for (const ch of keywords) { if (text.includes(ch)) matchCount++; }
    if (matchCount / keywords.length > 0.6) return systemQAResponses[key];
  }
  return null;
}

// ========== Send Message ==========
function sendMessage(openReport) {
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if (!text || isGenerating) return;

  document.getElementById('welcomeCard').style.display = 'none';
  addUserBubble(text);
  input.value = '';
  input.style.height = 'auto';

  const agentAtSend = currentAgent;
  isGenerating = true;
  const typingEl = addTypingIndicator();
  const shouldOpenReport = openReport || (agentAtSend === '智能报告') || (agentAtSend === '智能报表');

  setTimeout(() => {
    typingEl.remove();
    isGenerating = false;

    const sqaData = (agentAtSend === '系统问答') ? matchSystemQA(text) : null;

    if (sqaData) {
      addSystemQAResponse(sqaData, agentAtSend);
    } else if (shouldOpenReport || text.includes('月报') || text.includes('报表')) {
      const reportTitle = text.includes('报表') ? '监测数据统计报表' : '燃气监测运营月度报告';
      addAIResponseWithReport(text, reportTitle, agentAtSend);
      openReportPanel(reportTitle);
    } else if (text.includes('运行状态') || text.includes('管网')) {
      addAIDataResponse(agentAtSend);
    } else if (text.includes('报警')) {
      addAITextResponse('根据近一个月的报警数据统计：\n\n• 总报警数：<strong>127 起</strong>\n• 一级报警：<strong style="color:#EF4444">8 起</strong>（占比 6.3%）\n• 二级报警：<strong style="color:#F59E0B">23 起</strong>（占比 18.1%）\n• 三级报警：<strong>96 起</strong>（占比 75.6%）\n\n三级报警占比最高，主要集中在<strong>城北片区</strong>和<strong>工业园区周边</strong>。', [
        { label: '查看报警热力地图', action: () => sendQuickQ('展示报警热力分布图') },
        { label: '导出报警明细表', action: () => sendQuickQ('导出近一个月报警明细报表') },
      ], agentAtSend);
    } else {
      addAITextResponse('好的，我来为您分析。根据系统数据：\n\n当前城市生命线各监测专项运行平稳，暂未发现异常情况。如需深入了解某个专项的详细数据，请告诉我具体的分析方向。', [
        { label: '查看各专项运行概况', action: () => sendQuickQ('各专项运行状态概况') },
        { label: '近期预警趋势分析', action: () => sendQuickQ('近一个月的预警趋势如何？') },
      ], agentAtSend);
    }
    scrollChatBottom();
  }, 1800);
}

// ========== System Q&A Response ==========

  const chatArea = document.getElementById('chatArea');
  const msg = document.createElement('div');
  msg.className = 'chat-msg ai';

  const filtersHtml = data.filters.map(f =>
    '<span class="sqa-filter-tag"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="8" height="8" rx="1.5"/></svg>' + f.label + '：' + f.value + '</span>'
  ).join('');

  const thinkingHtml = getSystemThinkingHtml(data.thinking);

  const recommendHtml = data.recommendations.map(r =>

    var sel = window.getSelection(); if (!sel || sel.rangeCount === 0) return;

    else { top = e.clientY - cr.top - 40; left = e.clientX - cr.left - 140; }
    top = Math.max(4, top); left = Math.max(4, Math.min(left, cr.width - 320));
    toolbar.style.top = top + 'px'; toolbar.style.left = left + 'px'; toolbar.classList.add('visible');
  }
  document.addEventListener('mousedown', function(e) { if (!toolbar.contains(e.target) && !reportBody.contains(e.target)) { toolbar.classList.remove('visible'); document.getElementById('aiDropdown').classList.remove('show'); } });

// ========== Context Menu ==========
function showContextMenu(e, chatId) { e.preventDefault(); var menu = document.getElementById('contextMenu'); menu.style.display = 'block'; menu.style.left = e.clientX + 'px'; menu.style.top = e.clientY + 'px'; deleteTargetId = chatId; }
document.addEventListener('click', function() { document.getElementById('contextMenu').style.display = 'none'; });
function confirmDeleteChat() { document.getElementById('contextMenu').style.display = 'none'; document.getElementById('deleteDialog').classList.add('show'); }
function closeDialog() { document.getElementById('deleteDialog').classList.remove('show'); }
function deleteChat() { if (deleteTargetId) { var item = document.querySelector('.history-item[data-id="' + deleteTargetId + '"]'); if (item) item.remove(); deleteTargetId = null; } closeDialog(); }
function renameChat() { var item = document.querySelector('.history-item[data-id="' + deleteTargetId + '"]'); if (item) { var t = item.querySelector('.history-item-title'); var n = prompt('重命名会话：', t.textContent); if (n && n.trim()) t.textContent = n.trim(); } document.getElementById('contextMenu').style.display = 'none'; }

document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.history-item').forEach(function(item) {
    item.addEventListener('click', function() {
      document.querySelectorAll('.history-item').forEach(function(i) { i.classList.remove('active'); });
      this.classList.add('active');
      currentChatId = this.dataset.id;
      document.getElementById('welcomeCard').style.display = 'none';
      var chatArea = document.getElementById('chatArea');
      chatArea.querySelectorAll('.chat-msg').forEach(function(m) { m.remove(); });
      var title = this.querySelector('.history-item-title').textContent;
      addUserBubble(title);
      addAITextResponse('已为您加载该会话的历史记录。当前会话主题：<strong>' + title + '</strong>。请继续提问或选择功能。', [
        { label: '查看详细记录', action: function(){} },
        { label: '基于此主题继续分析', action: function(){} }
      ]);
    });
  });
});
</script>
